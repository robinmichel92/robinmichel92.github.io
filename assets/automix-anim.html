  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"0399ad66-941e-4bee-af68-605261592230\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   AIreo — Color tokens\n   Studio-grade dark UI for pro audio. Cool near-black surfaces,\n   hairline borders, per-line accent (AAF violet / WAV green).\n   ============================================================ */\n\n:root {\n  /* ---- Raw neutral ramp (cool charcoal, never pure black) ---- */\n  --gray-950: #0e1216;   /* app backdrop, deepest — AIreo premium dark */\n  --gray-900: #101720;   /* base surface */\n  --gray-850: #131a23;   /* sunken / track wells */\n  --gray-800: #181b24;   /* panel */\n  --gray-750: #1e222e;   /* raised control */\n  --gray-700: #272c3a;   /* control hover */\n  --gray-600: #353b4d;   /* strong border / divider */\n  --gray-500: #4b5266;   /* disabled stroke */\n  --gray-400: #6b7080;   /* tertiary text */\n  --gray-300: #8a90a3;   /* secondary text */\n  --gray-200: #a8aec0;   /* muted body */\n  --gray-100: #d6d9e2;   /* high body */\n  --gray-050: #f0f1f5;   /* primary text */\n  --white:    #ffffff;\n\n  /* ---- Brand / line accents ---- */\n  --violet-700: #5b49d6;\n  --violet-600: #6c5af0;\n  --violet-500: #7c6cf0;   /* AAF line — canonical */\n  --violet-400: #9a8df4;\n  --violet-300: #bdb4f8;\n\n  --green-700: #1f9e7a;\n  --green-600: #29b88f;\n  --green-500: #34d3a6;    /* WAV line — canonical */\n  --green-400: #5fe0bb;\n  --green-300: #92ebd1;\n\n  /* ---- Semantic status ---- */\n  --red-500:    #f0556b;\n  --amber-500:  #f0b23c;\n  --blue-500:   #5aa8f0;\n  --pink-500:   #e8699c;   /* Musique category */\n\n  /* =========================================================\n     SEMANTIC ALIASES — reference these in components\n     ========================================================= */\n\n  /* Surfaces */\n  --surface-app:     var(--gray-950);\n  --surface-base:    var(--gray-900);\n  --surface-sunken:  var(--gray-850);\n  --surface-panel:   var(--gray-800);\n  --surface-raised:  var(--gray-750);\n  --surface-hover:   var(--gray-700);\n  --surface-overlay: rgba(8, 9, 13, 0.66);  /* scrim behind modals */\n\n  /* Borders / hairlines */\n  --line-faint:   rgba(255, 255, 255, 0.06);\n  --line-soft:    rgba(255, 255, 255, 0.10);\n  --line:         rgba(255, 255, 255, 0.14);\n  --line-strong:  rgba(255, 255, 255, 0.22);\n\n  /* Text */\n  --text-1: var(--gray-050);   /* primary */\n  --text-2: var(--gray-300);   /* secondary */\n  --text-3: var(--gray-400);   /* tertiary / captions */\n  --text-disabled: var(--gray-500);\n  --text-on-accent: #0b0c10;   /* dark text on bright green accent */\n\n  /* ---- Accent: defaults to the AIreo signature violet.\n     body.src-aaf / body.src-wav reassign --accent for the active line.\n     Everything (buttons, waveforms, selections, focus) follows it. ---- */\n  --accent:        var(--violet-500);\n  --accent-strong: var(--violet-600);\n  --accent-soft:   var(--violet-400);\n  --accent-text:   var(--violet-300);\n  --accent-contrast: #ffffff;                                   /* text on solid accent */\n  --accent-tint:   color-mix(in srgb, var(--accent) 16%, transparent);\n  --accent-tint-2: color-mix(in srgb, var(--accent) 28%, transparent);\n  --accent-line:   color-mix(in srgb, var(--accent) 46%, transparent);\n  --accent-glow:   color-mix(in srgb, var(--accent) 40%, transparent);\n\n  /* Per-line raw accents (for legends, swatches, dual displays) */\n  --line-aaf: var(--violet-500);\n  --line-wav: var(--green-500);\n\n  /* Voice highlight (per-voice rows in the mapping view) */\n  --voice: var(--amber-500);\n\n  /* =========================================================\n     TRACK CATEGORIES — the mapping view colour-codes lanes by\n     category. Voix violet · Musique rose · FX ambre · Mixdown bleu.\n     ========================================================= */\n  --cat-voix:    var(--violet-500);\n  --cat-musique: var(--pink-500);\n  --cat-fx:      var(--amber-500);\n  --cat-mixdown: var(--blue-500);\n  --cat-voix-tint:    color-mix(in srgb, var(--violet-500) 16%, transparent);\n  --cat-musique-tint: color-mix(in srgb, var(--pink-500) 16%, transparent);\n  --cat-fx-tint:      color-mix(in srgb, var(--amber-500) 16%, transparent);\n  --cat-mixdown-tint: color-mix(in srgb, var(--blue-500) 16%, transparent);\n\n  /* Status semantics */\n  --danger:  var(--red-500);\n  --warning: var(--amber-500);\n  --success: var(--green-500);\n  --info:    var(--blue-500);\n  --danger-tint:  color-mix(in srgb, var(--red-500) 16%, transparent);\n  --warning-tint: color-mix(in srgb, var(--amber-500) 16%, transparent);\n  --success-tint: color-mix(in srgb, var(--green-500) 16%, transparent);\n\n  /* Waveform palette */\n  --wave-before: var(--gray-500);   /* \"avant\" / unprocessed, dimmed */\n  --wave-after:  var(--accent);     /* \"après\" / processed, bright */\n  --wave-bg:     var(--gray-850);\n  --playhead:    var(--gray-050);\n\n  /* =========================================================\n     BRAND WORDMARK — « AIreo. »\n     « AI » = the engine (takes the line accent) · « reo » = the\n     human voice (brand ink white) · « . » = on-air / ready signal.\n     ========================================================= */\n  --brand-ink: #e6eaec;    /* \"reo\" + the dot at rest */\n  --ai-ignite: var(--green-500);                                 /* \"AI\" fill — green by default (vert par défaut); per-line below */\n  --ai-glow:   color-mix(in srgb, var(--green-500) 55%, transparent);\n  /* Radial \"material\" fills for the AI mark (per the logo contexts) */\n  --ai-grad-wav: radial-gradient(120% 140% at 36% 30%, #9df0d4 0%, #34d3a6 42%, #157a5c 100%); /* @kind color */\n  --ai-grad-aaf: radial-gradient(120% 140% at 36% 30%, #c6bcff 0%, #7c6cf0 42%, #3e338f 100%); /* @kind color */\n  --ai-grad: var(--ai-grad-wav);  /* default = WAV green; reassigned per line below */\n  --onair: var(--green-500);      /* the dot when a session is ready / diffusable */\n}\n\n/* ---- Active-line accent reassignment (load-bearing in ClearVoice) ---- */\nbody.src-aaf { --accent: var(--violet-500); --accent-strong: var(--violet-600); --accent-soft: var(--violet-400); --accent-text: var(--violet-300); --ai-ignite: var(--violet-500); --ai-glow: color-mix(in srgb, var(--violet-500) 55%, transparent); --ai-grad: var(--ai-grad-aaf); --onair: var(--violet-500); }\nbody.src-wav { --accent: var(--green-500);  --accent-strong: var(--green-600);  --accent-soft: var(--green-400);  --accent-text: var(--green-300); --accent-contrast: #07140f; --ai-ignite: var(--green-500); --ai-glow: color-mix(in srgb, var(--green-500) 55%, transparent); --ai-grad: var(--ai-grad-wav); --onair: var(--green-500); }\n\n/* ============================================================\n   AIreo — Typography tokens\n   Hanken Grotesk (UI/display) + Geist Mono (technical readouts).\n   Mono is a load-bearing brand motif: timecodes, LUFS, dB, %, Hz.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-sans: 'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', 'JetBrains Mono', monospace;\n\n  /* ---- Weights ---- */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-black: 800; /* @kind font */\n\n  /* ---- Type scale (px) — UI-density first ---- */\n  --fs-display: 44px;\n  --fs-h1: 32px;\n  --fs-h2: 24px;\n  --fs-h3: 18px;\n  --fs-body: 14px;     /* default UI body */\n  --fs-body-lg: 16px;\n  --fs-label: 13px;\n  --fs-caption: 12px;\n  --fs-micro: 11px;    /* mono tags, badges */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.05; /* @kind font */\n  --lh-snug: 1.2; /* @kind font */\n  --lh-normal: 1.45; /* @kind font */\n  --lh-relaxed: 1.6; /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight: -0.02em; /* @kind font */\n  --ls-snug: -0.01em; /* @kind font */\n  --ls-normal: 0; /* @kind font */\n  --ls-wide: 0.02em; /* @kind font */\n  --ls-caps: 0.08em; /* @kind font */ /* uppercase eyebrows / section labels */\n\n  /* =========================================================\n     SEMANTIC TYPE ROLES\n     ========================================================= */\n  --type-display: var(--fw-bold) var(--fs-display)/var(--lh-tight) var(--font-sans);\n  --type-h1: var(--fw-bold) var(--fs-h1)/var(--lh-snug) var(--font-sans);\n  --type-h2: var(--fw-semibold) var(--fs-h2)/var(--lh-snug) var(--font-sans);\n  --type-h3: var(--fw-semibold) var(--fs-h3)/var(--lh-snug) var(--font-sans);\n  --type-body: var(--fw-regular) var(--fs-body)/var(--lh-normal) var(--font-sans);\n  --type-body-strong: var(--fw-semibold) var(--fs-body)/var(--lh-normal) var(--font-sans);\n  --type-label: var(--fw-medium) var(--fs-label)/var(--lh-snug) var(--font-sans);\n  --type-caption: var(--fw-regular) var(--fs-caption)/var(--lh-normal) var(--font-sans);\n  --type-mono: var(--fw-medium) var(--fs-caption)/var(--lh-snug) var(--font-mono);\n  --type-mono-data: var(--fw-medium) var(--fs-body)/var(--lh-snug) var(--font-mono);\n\n  /* Eyebrow / section label utility values */\n  --eyebrow-size: var(--fs-micro);\n  --eyebrow-spacing: var(--ls-caps);\n}\n\n/* ============================================================\n   AIreo — Spacing tokens\n   4px base grid. Dense, instrument-panel rhythm.\n   ============================================================ */\n\n:root {\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 48px;\n  --space-10: 64px;\n  --space-11: 80px;\n  --space-12: 96px;\n\n  /* Semantic spacing */\n  --gap-control: var(--space-2);   /* between inline controls */\n  --gap-field: var(--space-4);     /* between settings fields */\n  --gap-section: var(--space-7);   /* between panel sections */\n  --pad-control: var(--space-3);   /* inside buttons/inputs */\n  --pad-card: var(--space-5);      /* inside cards/panels */\n  --pad-screen: var(--space-8);    /* screen gutters */\n\n  /* Common layout dims */\n  --sidebar-w: 360px;              /* settings panel width */\n  --header-h: 56px;                /* app header height */\n  --strip-h: 84px;                 /* audio A/B strip height */\n  --control-h: 36px;               /* default control height */\n  --control-h-sm: 28px;\n  --control-h-lg: 44px;\n}\n\n/* ============================================================\n   AIreo — Radius tokens\n   Restrained, instrument-grade radii. Pills for toggles/segmented.\n   ============================================================ */\n\n:root {\n  --radius-xs: 4px;    /* chips, tags, inner controls */\n  --radius-sm: 6px;    /* buttons, inputs */\n  --radius-md: 10px;   /* cards, panels, fields */\n  --radius-lg: 14px;   /* modals, large surfaces */\n  --radius-xl: 20px;   /* hero containers */\n  --radius-pill: 999px;\n  --radius-round: 50%;\n}\n\n/* ============================================================\n   AIreo — Elevation tokens\n   Dark-UI shadows: deep, soft, low-spread. Plus accent glow used\n   sparingly on active waveforms / playheads / focus.\n   ============================================================ */\n\n:root {\n  /* Layered shadows for surfaces above the panel plane */\n  --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.45);\n  --shadow-3: 0 10px 28px rgba(0, 0, 0, 0.50);\n  --shadow-pop: 0 16px 48px rgba(0, 0, 0, 0.60);            /* modals, overlays */\n  --shadow-strip: 0 -8px 32px rgba(0, 0, 0, 0.45);          /* floating audio strip */\n\n  /* Inset for sunken wells (track lanes, sliders, input fields) */\n  --shadow-inset: inset 0 1px 2px rgba(0, 0, 0, 0.45);\n\n  /* Accent glow — active states only */\n  --glow-accent: 0 0 0 1px var(--accent-line), 0 0 16px -2px var(--accent-glow);\n  --glow-accent-soft: 0 0 12px -2px var(--accent-glow);\n\n  /* Focus ring (keyboard) */\n  --ring-focus: 0 0 0 2px var(--surface-app), 0 0 0 4px var(--accent);\n  --ring-focus-tight: 0 0 0 2px var(--accent-line);\n}\n\n/* ============================================================\n   AIreo — Motion tokens\n   Precise and quick. No bounce — this is a studio instrument.\n   ============================================================ */\n\n:root {\n  /* Durations */\n  --dur-instant: 80ms; /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur: 180ms; /* @kind other */\n  --dur-slow: 280ms; /* @kind other */\n  --dur-slower: 420ms; /* @kind other */\n\n  /* Easing */\n  --ease-out: cubic-bezier(0.2, 0, 0, 1); /* @kind other */ /* snappy decel default */\n  --ease-in-out: cubic-bezier(0.5, 0, 0.2, 1); /* @kind other */\n  --ease-in: cubic-bezier(0.5, 0, 1, 1); /* @kind other */\n  --ease-linear: linear; /* @kind other */ /* playheads, meters */\n\n  /* Common composed transitions */\n  --transition-control: background-color var(--dur-fast) var(--ease-out),\n                        border-color var(--dur-fast) var(--ease-out),\n                        color var(--dur-fast) var(--ease-out),\n                        box-shadow var(--dur-fast) var(--ease-out);\n  --transition-transform: transform var(--dur-fast) var(--ease-out);\n}\n\n/* ============================================================\n   AIreo — Base layer\n   Minimal global defaults so cards, kits and consuming designs\n   inherit the brand surface + type without extra setup.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font: var(--type-body);\n  color: var(--text-1);\n  background: var(--surface-app);\n  letter-spacing: var(--ls-snug);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, p { margin: 0; }\n\n::selection { background: var(--accent-tint-2); color: var(--text-1); }\n\n/* Numeric readouts opt into tabular figures + mono */\n.cv-data, [data-mono] {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: var(--ls-normal);\n}\n\n/* Uppercase eyebrow / section label utility */\n.cv-eyebrow {\n  font: var(--type-mono);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-caps);\n  color: var(--text-3);\n}\n\n/* Thin custom scrollbars on dark surfaces */\n* { scrollbar-width: thin; scrollbar-color: var(--gray-600) transparent; }\n*::-webkit-scrollbar { width: 10px; height: 10px; }\n*::-webkit-scrollbar-thumb { background: var(--gray-600); border-radius: var(--radius-pill); border: 3px solid transparent; background-clip: padding-box; }\n*::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }\n}\n\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; background: var(--surface-app); color: var(--text-1); }\n\n  .section {\n    position: relative; overflow: hidden;\n    padding: clamp(48px, 7vw, 96px) clamp(24px, 6vw, 96px);\n    background:\n      radial-gradient(50% 70% at 92% 4%, color-mix(in srgb, var(--green-500) 12%, transparent), transparent 62%),\n      radial-gradient(46% 60% at 4% 100%, color-mix(in srgb, var(--green-500) 7%, transparent), transparent 60%),\n      var(--surface-app);\n  }\n  .wrap {\n    max-width: 1240px; margin: 0 auto;\n    display: grid; grid-template-columns: minmax(0, 0.96fr) minmax(0, 1.04fr);\n    gap: clamp(36px, 5vw, 80px); align-items: center;\n  }\n  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }\n\n  /* left copy */\n  .copy { display: flex; flex-direction: column; gap: var(--space-5); }\n  .eyebrow { font-family: var(--font-mono); font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--green-300); }\n  .title { margin: 0; font-weight: var(--fw-black); font-size: clamp(34px, 4.4vw, 54px); line-height: 1.03; letter-spacing: var(--ls-tight); text-wrap: balance; }\n  .lede { margin: 0; max-width: 54ch; font-size: var(--fs-body-lg); line-height: var(--lh-normal); color: var(--text-2); text-wrap: pretty; }\n  .lede b { color: var(--text-1); font-weight: var(--fw-semibold); }\n  .lede i { color: var(--text-1); font-style: italic; }\n  .hi { color: var(--green-300); font-weight: var(--fw-semibold); }\n  .checks { list-style: none; margin: var(--space-2) 0 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-3); }\n  .checks li { display: flex; align-items: center; gap: var(--space-3); font-size: var(--fs-body); color: var(--text-2); }\n  .checks .ck { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; flex: none; color: var(--green-300); background: color-mix(in srgb, var(--green-500) 16%, transparent); border-radius: 50%; }\n  .checks .ck svg { width: 13px; height: 13px; stroke-width: 2.4; }\n\n  /* right board */\n  .board { position: relative; border-radius: var(--radius-xl); background: linear-gradient(180deg, var(--surface-panel), var(--surface-base)); border: 1px solid var(--line-soft); box-shadow: var(--shadow-pop); padding: 18px; }\n  .board__bar { display: flex; align-items: center; gap: var(--space-3); padding: 0 2px 14px; }\n  .board__name { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-2); }\n  .board__meta { font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-3); }\n  .pill { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; height: 24px; padding: 0 11px; border-radius: var(--radius-pill); font-family: var(--font-mono); font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--green-300); background: color-mix(in srgb, var(--green-500) 15%, transparent); border: 1px solid color-mix(in srgb, var(--green-500) 42%, transparent); white-space: nowrap; }\n  .pill .pd { width: 7px; height: 7px; border-radius: 50%; background: var(--green-500); box-shadow: 0 0 7px var(--green-500); animation: cv-pulse 1.8s var(--ease-in-out) infinite; }\n  @keyframes cv-pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }\n\n  .stage { position: relative; }\n  .lane { position: relative; display: flex; align-items: stretch; }\n  .lane + .lane { margin-top: 12px; }\n  .lane__gutter { width: 96px; flex: none; display: flex; flex-direction: column; justify-content: center; gap: 3px; padding-right: 12px; }\n  .lane__name { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; color: var(--text-1); }\n  .lane__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-500); box-shadow: 0 0 7px color-mix(in srgb, var(--green-500) 70%, transparent); flex: none; }\n  .lane__meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); padding-left: 16px; }\n\n  .track { position: relative; flex: 1; height: 76px; border-radius: 9px; background: var(--surface-sunken); box-shadow: inset 0 0 0 1px var(--line-faint); overflow: hidden; }\n  .track svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }\n  .track .proc { clip-path: inset(0 calc((1 - var(--pf, 0)) * 100%) 0 0); }\n\n  /* playhead spanning both lanes */\n  .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--green-300); box-shadow: 0 0 10px var(--green-400); left: calc(96px + (100% - 96px) * var(--pf, 0)); transform: translateX(-1px); pointer-events: none; transition: opacity .3s; }\n  .node { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--green-300); box-shadow: 0 0 9px 1px var(--green-400); transform: translate(-50%, -50%); pointer-events: none; }\n\n  .outsep { height: 1px; background: var(--line-soft); margin: 16px 0 0 96px; }\n  .lane--out { margin-top: 13px; }\n  .lane--out .lane__dot { background: var(--green-400); box-shadow: 0 0 8px var(--green-400); }\n  .lane--out .lane__meta { color: var(--green-300); }\n  .track--out { height: 84px; background: color-mix(in srgb, var(--green-500) 7%, var(--surface-sunken)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--green-500) 24%, transparent); }\n  .outtag { position: absolute; top: 7px; right: 9px; z-index: 2; font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--green-300); background: color-mix(in srgb, var(--green-500) 16%, transparent); border: 1px solid color-mix(in srgb, var(--green-500) 42%, transparent); border-radius: 999px; padding: 2px 8px; }\n\n  .legend { display: flex; gap: 16px; margin-top: 12px; padding-left: 96px; }\n  .lg { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); }\n  .lg i { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }\n\n  @media (prefers-reduced-motion: reduce) { .pill .pd { animation: none; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"src-wav\">\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <div class=\"copy\">\n        <span class=\"eyebrow\">Ce que personne ne fait<\u002Fspan>\n        <h2 class=\"title\">Plusieurs micros ?<br>Aireo les équilibre pour vous.<\u002Fh2>\n        <p class=\"lede\">\n          À partir de vos <span class=\"hi\">fichiers séparés<\u002Fspan>, Aireo aligne vos micros et\n          <span class=\"hi\">équilibre leurs niveaux<\u002Fspan> entre eux — qui parle, on l'entend. Aucun\n          outil ne le fait : un prémix brut ramène le souffle, l'écho et la repisse. Aireo nettoie\n          <i>d'abord<\u002Fi>, puis cale les niveaux — propre, pas boueux. Vous récupérez une base\n          équilibrée, <span class=\"hi\">prête à mixer<\u002Fspan>.\n        <\u002Fp>\n        <ul class=\"checks\">\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan> Micros alignés automatiquement (zéro souci de phase)<\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan> Qui parle est qui s'entend — niveaux équilibrés au fil<\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan> Dé-repisse : le micro des autres retiré du fond<\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan> En sortie : une base équilibrée, prête à mixer<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"board\">\n        <div class=\"board__bar\">\n          <span class=\"board__name\">autolevel.wav<\u002Fspan>\n          <span class=\"board__meta\">· 2 micros · −16 LUFS<\u002Fspan>\n          <span class=\"pill\"><span class=\"pd\"><\u002Fspan>autolevel<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage\" id=\"stage\">\n          <div class=\"lane\">\n            <div class=\"lane__gutter\"><span class=\"lane__name\"><span class=\"lane__dot\"><\u002Fspan>MIC 1<\u002Fspan><span class=\"lane__meta\">marie.wav<\u002Fspan><\u002Fdiv>\n            <div class=\"track\"><svg class=\"raw\" id=\"raw1\" viewBox=\"0 0 1000 76\" preserveAspectRatio=\"none\"><\u002Fsvg><svg class=\"proc\" id=\"proc1\" viewBox=\"0 0 1000 76\" preserveAspectRatio=\"none\"><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"lane\">\n            <div class=\"lane__gutter\"><span class=\"lane__name\"><span class=\"lane__dot\"><\u002Fspan>MIC 2<\u002Fspan><span class=\"lane__meta\">karim.wav<\u002Fspan><\u002Fdiv>\n            <div class=\"track\"><svg class=\"raw\" id=\"raw2\" viewBox=\"0 0 1000 76\" preserveAspectRatio=\"none\"><\u002Fsvg><svg class=\"proc\" id=\"proc2\" viewBox=\"0 0 1000 76\" preserveAspectRatio=\"none\"><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"outsep\"><\u002Fdiv>\n          <div class=\"lane lane--out\">\n            <div class=\"lane__gutter\"><span class=\"lane__name\"><span class=\"lane__dot\"><\u002Fspan>SORTIE<\u002Fspan><span class=\"lane__meta\">équilibrée<\u002Fspan><\u002Fdiv>\n            <div class=\"track track--out\"><span class=\"outtag\">équilibré<\u002Fspan><svg class=\"raw\" id=\"outbase\" viewBox=\"0 0 1000 84\" preserveAspectRatio=\"none\"><\u002Fsvg><svg class=\"proc\" id=\"outproc\" viewBox=\"0 0 1000 84\" preserveAspectRatio=\"none\"><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"playhead\" id=\"playhead\"><\u002Fdiv>\n          <div class=\"node\" id=\"node1\"><\u002Fdiv>\n          <div class=\"node\" id=\"node2\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"legend\">\n          <span class=\"lg\"><i style=\"background:#555c70\"><\u002Fi> Signal d'origine<\u002Fspan>\n          <span class=\"lg\"><i style=\"background:var(--green-400)\"><\u002Fi> Courbe autolevel — suit les pics<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <script>\n  (function () {\n    const N = 230;                                            // signal resolution\n    const A1 = [[0.03, 0.26], [0.45, 0.63], [0.81, 0.99]];    // mic 1 speaks\n    const A2 = [[0.30, 0.42], [0.66, 0.80]];                  // mic 2 speaks\n    const BLEED = 0.09, W = 1000, H = 76;\n\n    function inAny(t, iv) { return iv.some(([a, b]) => t >= a && t < b); }\n    function rng(s) { return () => (s = (s * 1103515245 + 12345) & 0x7fffffff, s / 0x7fffffff); }\n\n    // Realistic per-mic waveform: speech bursts (syllables + transients) when\n    // active, low bleed otherwise. amp[i] in 0..1 = the grey waveform amplitude.\n    function signal(active, seed) {\n      const r = rng(seed); const amp = [];\n      for (let i = 0; i < N; i++) {\n        const t = i / (N - 1);\n        const on = inAny(t, active);\n        // syllable rhythm + jitter → peaks and dips\n        const syl = 0.5 + 0.5 * Math.sin(t * Math.PI * 46 + seed);\n        const jit = r();\n        let a = on ? (0.30 + 0.70 * Math.pow(syl, 1.6) * (0.45 + 0.55 * jit)) : BLEED * (0.5 + 0.9 * jit);\n        // occasional loud transient\n        if (on && jit > 0.93) a = Math.min(1, a + 0.35);\n        amp.push(a);\n      }\n      return amp;\n    }\n\n    // Peak follower with ATTACK + HOLD + RELEASE. Fast attack catches transients;\n    // the hold bridges short syllable gaps so the top of the curve is a smooth\n    // plateau (it doesn't chase every micro-variation); once a real silence sets\n    // in, the hold expires and a fast release lets it drop quickly.\n    function follow(amp, atk, rel, hold) {\n      const e = []; let v = 0, hc = 0;\n      for (let i = 0; i < N; i++) {\n        const t = amp[i];\n        if (t > v) { v += atk * (t - v); hc = hold; }\n        else if (hc > 0) { hc--; }\n        else { v += rel * (t - v); }\n        e.push(v);\n      }\n      // light rounding of the corners\n      for (let i = 1; i < N; i++) e[i] = e[i] * 0.8 + e[i - 1] * 0.2;\n      for (let i = N - 2; i >= 0; i--) e[i] = e[i] * 0.86 + e[i + 1] * 0.14;\n      return e;\n    }\n\n    // Map the follower around the CENTRE line: above FLOOR the curve rides up\n    // toward the peaks; below FLOOR (bleed / room / silence) it goes NEGATIVE,\n    // dipping under the centre — i.e. below the grey waveform — to show the\n    // repisse being pulled out.\n    const FLOOR = 0.34;\n    function toLevel(e) { return e.map((v) => Math.max(-0.55, (v - FLOOR) / (1 - FLOOR))); }\n\n    const amp1 = signal(A1, 7), amp2 = signal(A2, 23);\n    const lvl1 = toLevel(follow(amp1, 0.6, 0.30, 9)), lvl2 = toLevel(follow(amp2, 0.6, 0.30, 9));\n\n    function catmull(pts) {\n      let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;\n      for (let i = 0; i < pts.length - 1; i++) {\n        const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;\n        d += `C${(p1[0] + (p2[0] - p0[0]) / 6).toFixed(1)},${(p1[1] + (p2[1] - p0[1]) / 6).toFixed(1)} ${(p2[0] - (p3[0] - p1[0]) / 6).toFixed(1)},${(p2[1] - (p3[1] - p1[1]) / 6).toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;\n      }\n      return d;\n    }\n    // curve maps a signed level around the centre line (can dip below it)\n    const PAD = 5;\n    function yOf(v) { return H / 2 - v * (H / 2 - PAD); }\n    function envD(env) { return catmull(env.map((v, i) => [i / (N - 1) * W, yOf(v)])); }\n    // ~11 automation breakpoints per curve, evenly spread along the timeline\n    // (they ride the curve up and down, like real volume-automation points)\n    function nodes() {\n      const out = [], COUNT = 11;\n      for (let k = 1; k <= COUNT; k++) out.push(Math.round(k * (N - 1) / (COUNT + 1)));\n      return out;\n    }\n\n    function build(rawId, procId, amp, env) {\n      const n = 150, bw = W / n;\n      // faint centre (unity) reference line\n      let rawS = `<line x1=\"0\" y1=\"${H / 2}\" x2=\"${W}\" y2=\"${H / 2}\" stroke=\"rgba(255,255,255,0.07)\" stroke-width=\"1\"/>`;\n      let procS = '';\n      for (let i = 0; i < n; i++) {\n        const gi = Math.round(i / n * (N - 1));\n        const x = (i * bw + bw * 0.26).toFixed(1), w = (bw * 0.48).toFixed(1);\n        const h = Math.max(2, amp[gi] * (H - 12));\n        const y = ((H - h) / 2).toFixed(1);\n        rawS += `<rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h.toFixed(1)}\" rx=\"1.1\" fill=\"#555c70\" opacity=\"0.55\"/>`;\n        procS += `<rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h.toFixed(1)}\" rx=\"1.1\" fill=\"#34d3a6\" opacity=\"0.34\"/>`;\n      }\n      // the autolevel curve + transient nodes (drawn on the processed/revealed layer)\n      procS += `<path d=\"${envD(env)}\" fill=\"none\" stroke=\"#5fe0bb\" stroke-width=\"2.2\" stroke-linecap=\"round\" style=\"filter:drop-shadow(0 0 4px rgba(52,211,166,.85))\"/>`;\n      nodes().forEach((i) => {\n        procS += `<circle cx=\"${(i / (N - 1) * W).toFixed(1)}\" cy=\"${yOf(env[i]).toFixed(1)}\" r=\"2.6\" fill=\"#92ebd1\" style=\"filter:drop-shadow(0 0 3px rgba(52,211,166,1))\"/>`;\n      });\n      document.getElementById(rawId).innerHTML = rawS;\n      document.getElementById(procId).innerHTML = procS;\n    }\n    build('raw1', 'proc1', amp1, lvl1);\n    build('raw2', 'proc2', amp2, lvl2);\n\n    // SORTIE — the balanced output: a single even waveform (≈ constant target\n    // level wherever anyone speaks), as if the two autolevel curves summed into\n    // one perfectly levelled signal. Same playhead reveals it left→right.\n    const HO = 84;\n    const rj = rng(99);\n    const outAmp = [];\n    for (let i = 0; i < N; i++) {\n      const t = i / (N - 1);\n      const present = inAny(t, A1) || inAny(t, A2);\n      const det = 0.5 + 0.5 * Math.sin(t * Math.PI * 50 + 1.3);\n      // gentle natural drift so the balanced output breathes a little\n      const drift = 0.06 * Math.sin(t * Math.PI * 7.5 + 0.6) + 0.05 * Math.sin(t * Math.PI * 19 + 2.1);\n      outAmp.push(present ? 0.5 + 0.13 * det + drift + 0.07 * (rj() - 0.5) : 0.05 + 0.04 * rj());\n    }\n    (function buildOut() {\n      const n = 150, bw = W / n;\n      let baseS = `<line x1=\"0\" y1=\"${HO / 2}\" x2=\"${W}\" y2=\"${HO / 2}\" stroke=\"rgba(255,255,255,0.07)\" stroke-width=\"1\"/>`;\n      let procS = '';\n      for (let i = 0; i < n; i++) {\n        const gi = Math.round(i / n * (N - 1));\n        const x = (i * bw + bw * 0.26).toFixed(1), w = (bw * 0.48).toFixed(1);\n        const h = Math.max(2, outAmp[gi] * (HO - 14));\n        const y = ((HO - h) / 2).toFixed(1);\n        baseS += `<rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h.toFixed(1)}\" rx=\"1.1\" fill=\"#34d3a6\" opacity=\"0.15\"/>`;\n        procS += `<rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h.toFixed(1)}\" rx=\"1.1\" fill=\"#34d3a6\"/>`;\n      }\n      document.getElementById('outbase').innerHTML = baseS;\n      document.getElementById('outproc').innerHTML = procS;\n    })();\n\n    // animation — playhead sweeps; the green curve \"computes\" left→right\n    const stage = document.getElementById('stage');\n    const ph = document.getElementById('playhead');\n    const node1 = document.getElementById('node1'), node2 = document.getElementById('node2');\n    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    function place(pf) {\n      stage.style.setProperty('--pf', pf);\n      const idx = Math.min(N - 1, Math.round(pf * (N - 1)));\n      const tracks = stage.querySelectorAll('.track');\n      const sr = stage.getBoundingClientRect(), r0 = tracks[0].getBoundingClientRect();\n      const x = (r0.left - sr.left) + r0.width * pf;\n      [[node1, lvl1, tracks[0]], [node2, lvl2, tracks[1]]].forEach(([nd, env, tr]) => {\n        const tb = tr.getBoundingClientRect();\n        const y = (tb.top - sr.top) + (yOf(env[idx]) / H) * tb.height;\n        nd.style.left = x + 'px'; nd.style.top = y + 'px';\n      });\n      const vis = pf >= 0.995 || pf <= 0.004 ? '0' : '1';\n      ph.style.opacity = node1.style.opacity = node2.style.opacity = vis;\n    }\n\n    if (reduce) { place(1); return; }\n\n    const SWEEP = 4600, HOLD = 1500, TOTAL = SWEEP + HOLD;\n    let t0 = null;\n    function frame(ts) {\n      if (t0 == null) t0 = ts;\n      const e = (ts - t0) % TOTAL;\n      place(e < SWEEP ? e / SWEEP : 1);\n      requestAnimationFrame(frame);\n    }\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((es) => es.forEach((x) => { if (x.isIntersecting) { requestAnimationFrame(frame); io.disconnect(); } }), { threshold: 0.25 });\n      io.observe(stage);\n    } else requestAnimationFrame(frame);\n    window.addEventListener('resize', () => place(parseFloat(stage.style.getPropertyValue('--pf')) || 0));\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
